services:
  pd:
    image: pingcap/pd:v8.5.5
    command: ["--name=pd", "--data-dir=/pd/data", "--client-urls=http://0.0.0.0:2379", "--advertise-client-urls=http://pd:2379"]
    ports:
      - "2379:2379"
    volumes:
      - pd-data:/pd/data

  tikv:
    image: pingcap/tikv:v8.5.5
    depends_on:
      - pd
    command: ["--pd=pd:2379", "--addr=0.0.0.0:20160", "--advertise-addr=tikv:20160", "--data-dir=/tikv/data", "--status-addr=0.0.0.0:20180"]
    volumes:
      - tikv-data:/tikv/data
    ports:
      - "20160:20160"
      - "20180:20180"

  tidb:
    image: pingcap/tidb:v8.5.5
    depends_on:
      - pd
      - tikv
    command: ["--store=tikv", "--path=pd:2379", "--advertise-address=tidb"]
    ports:
      - "4000:4000" # MySQL-compatible
      - "10080:10080" # HTTP status port

  tiflash:
    image: pingcap/tiflash:v8.5.5
    depends_on:
      - pd
      - tikv
    command: ["tiflash", "server", "--config-file", "/etc/tiflash/tiflash.toml"]
    volumes:
      - tiflash-data:/tiflash/data
      - ./tiflash.toml:/etc/tiflash/tiflash.toml:ro
    ports:
      - "3930:3930"
      - "3931:3931"
      - "20170:20170"
      - "20292:20292"
      - "8234:8234"
    environment:
      - TZ=UTC

  prometheus:
    image: prom/prometheus:latest
    depends_on:
      - pd
      - tikv
      - tidb
      - tiflash
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  ng-monitoring:
    image: pingcap/ng-monitoring:v8.5.5
    depends_on:
      - pd
    command:
      - "--pd.endpoints=pd:2379"
    ports:
      - "7777:7777"

volumes:
  pd-data:
  tikv-data:
  tiflash-data:
  prometheus-data:
