global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "pd"
    static_configs:
      - targets: ["pd:2379"]
    metrics_path: "/metrics"

  - job_name: "tikv"
    static_configs:
      - targets: ["tikv:20180"]
    metrics_path: "/metrics"

  - job_name: "tidb"
    static_configs:
      - targets: ["tidb:10080"]
    metrics_path: "/metrics"

  - job_name: "tiflash"
    static_configs:
      - targets: ["tiflash:8234"]
    metrics_path: "/metrics"
