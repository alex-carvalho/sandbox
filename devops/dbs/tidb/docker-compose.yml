services:
  pd:
    image: pingcap/pd:v8.5.5
    command: ["pd-server", "--name=pd", "--data-dir=/pd/data", "--client-urls=http://0.0.0.0:2379", "--advertise-client-urls=http://pd:2379"]
    ports:
      - "2379:2379"
    volumes:
      - pd-data:/pd/data

  tikv:
    image: pingcap/tikv:v8.5.5
    depends_on:
      - pd
    command: ["tikv-server", "--pd=pd:2379", "--data-dir=/tikv/data", "--status-addr=0.0.0.0:20180"]
    volumes:
      - tikv-data:/tikv/data
    ports:
      - "20160:20160"
      - "20180:20180"

  tidb:
    image: pingcap/tidb:v8.5.5
    depends_on:
      - pd
      - tikv
    command: ["tidb-server", "--store=tikv", "--path=pd:2379", "--advertise-address=tidb"]
    ports:
      - "4000:4000" # MySQL-compatible
      - "10080:10080" # HTTP status port

  tiflash:
    image: pingcap/tiflash:v8.5.5
    depends_on:
      - pd
      - tikv
    command: ["tiflash", "serve", "--advertise-addr=tiflash", "--status-addr=0.0.0.0:20292"]
    volumes:
      - tiflash-data:/tiflash/data
    ports:
      - "3930:3930"
      - "20170:20170"
      - "20292:20292"
      - "8234:8234"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"

    
volumes:
  pd-data:
  tikv-data:
  tiflash-data:
