apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: canary-app-rollout
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: canary-app
  template:
    metadata:
      labels:
        app: canary-app
    spec:
      containers:
        - name: app
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: APP_VERSION
              value: "{{ .Values.appVersion }}"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
  strategy:
    canary:
      canaryService: canary-app-canary-svc
      stableService: canary-app-stable-svc
      analysis:
        templates:
          - templateName: canary-app-error-rate
        startingStep: 1
      steps:
        - setWeight: 20
        - pause:
            duration: 30s
        - setWeight: 50
        - pause:
            duration: 30s
        - setWeight: 80
        - pause:
            duration: 30s
