replicaCount: 5

image:
  repository: my-app
  tag: "latest"
  pullPolicy: Never

dbUrl: "postgres://user:pass@db:5432/mydb"

analysis:
  interval: 15s
  failureLimit: 3
  prometheusAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090

service:
  type: NodePort
  # Optional: set specific nodePort numbers. Omit or set to null for automatic assignment.
  nodePort:
    http: null
    metrics: null
